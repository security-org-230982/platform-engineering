{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simple-game.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "simple-game.name" . }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - {}
{{- end }}
