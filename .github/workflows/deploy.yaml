name: deploy-platform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'helm/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Product image tag
        required: true
        default: main

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: read

jobs:
  apply-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Checkout security-engineering repo
        uses: actions/checkout@v4
        with:
          repository: security-org-230982/security-engineering
          path: security

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.event.inputs.image_tag || 'main' }}"

  psa-alignment-check:
    needs:
      - apply-and-deploy
    uses: security-org-230982/security-engineering/.github/workflows/pod-security-admission.yaml@main
    with:
      eks-cluster-name: ${{ vars.EKS_CLUSTER_NAME }}
      aws-region: us-east-1
      namespace: simple-game
      expected-level: restricted
      expected-version: v1.30
    secrets:
      aws-role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

  cis-benchmark:
    needs:
      - apply-and-deploy
    uses: security-org-230982/security-engineering/.github/workflows/cis-benchmark.yaml@main
    with:
      eks-cluster-name: ${{ vars.EKS_CLUSTER_NAME }}
      aws-region: us-east-1
    secrets:
      aws-role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

