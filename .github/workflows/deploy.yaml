name: deploy-platform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'helm/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Product image tag
        required: true
        default: main

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: read

jobs:
  deploy-gates:
    uses: security-org-230982/security-engineering/.github/workflows/platform-deploy-gates.yaml@main
    with:
      image-ref: ghcr.io/security-org-230982/simple-game:${{ github.event.inputs.image_tag || 'main' }}
      chart-path: helm/simple-game
      values-file: helm/simple-game/values.yaml
      certificate-identity: "https://github.com/security-org-230982/security-engineering/.github/workflows/image-post-build.yaml@refs/heads/main"

  cis-benchmark:
    uses: security-org-230982/security-engineering/.github/workflows/cis-benchmark.yaml@main

  apply-and-deploy:
    runs-on: ubuntu-latest
    needs:
      - deploy-gates
      - cis-benchmark
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Checkout security-engineering repo
        uses: actions/checkout@v4
        with:
          repository: security-org-230982/security-engineering
          path: security

      - name: Debug directory structure
        run: |
          echo "Current directory:"
          pwd
          echo "Listing security folder:"
          ls -R security || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region us-east-1
          helm list -n kyverno -a
          helm history kyverno -n kyverno

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.event.inputs.image_tag || 'main' }}"
  
  admission-controller-check:
    runs-on: ubuntu-latest
    needs: 
      - apply-and-deploy
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Verify Kyverno admission controller is installed
        run: |
          kubectl get ns kyverno
          kubectl wait --for=condition=available deployment/kyverno-admission-controller -n kyverno --timeout=180s            

  falco-runtime-check:
    runs-on: ubuntu-latest
    needs: 
      - apply-and-deploy
      - admission-controller-check
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region us-east-1

      - name: Verify Falco is installed
        run: |
          kubectl get ns falco
          kubectl get pods -n falco
          kubectl rollout status daemonset/falco -n falco --timeout=180s

  psa-alignment-check:
    runs-on: ubuntu-latest
    needs:
      - apply-and-deploy
      - falco-runtime-check
      - admission-controller-check
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region us-east-1

      - name: Verify Pod Security Admission labels
        run: |
          NS="simple-game"

          ENFORCE=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/enforce}')
          ENFORCE_VERSION=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/enforce-version}')
          AUDIT=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/audit}')
          AUDIT_VERSION=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/audit-version}')
          WARN=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/warn}')
          WARN_VERSION=$(kubectl get ns "$NS" -o jsonpath='{.metadata.labels.pod-security\.kubernetes\.io/warn-version}')

          echo "Namespace: $NS"
          echo "enforce=$ENFORCE"
          echo "enforce-version=$ENFORCE_VERSION"
          echo "audit=$AUDIT"
          echo "audit-version=$AUDIT_VERSION"
          echo "warn=$WARN"
          echo "warn-version=$WARN_VERSION"

          test "$ENFORCE" = "restricted"
          test "$ENFORCE_VERSION" = "v1.30"
          test "$AUDIT" = "restricted"
          test "$AUDIT_VERSION" = "v1.30"
          test "$WARN" = "restricted"
          test "$WARN_VERSION" = "v1.30"

  install-kyverno-policies:
    runs-on: ubuntu-latest
    needs: 
      - apply-and-deploy
      - falco-runtime-check
      - psa-alignment-check
      - admission-controller-check
    steps:
      - name: Checkout security-engineering repo
        uses: actions/checkout@v4
        with:
          repository: security-org-230982/security-engineering
          path: security

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Apply Kyverno policies
        run: |
          kubectl apply -f security/security/kyverno/policies/

      - name: Wait for Kyverno admission controller
        run: |
          kubectl wait \
            --for=condition=available deployment/kyverno-admission-controller \
            -n kyverno \
            --timeout=180s
      
      - name: Verify installed Kyverno policies
        run: |
          kubectl get cpol require-signed-images
          kubectl describe cpol require-signed-images
          kubectl get cpol
