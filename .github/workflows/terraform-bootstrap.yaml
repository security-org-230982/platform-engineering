name: terraform-bootstrap

on:
  push:
    branches: [main]
    paths:
      - 'terraform/bootstrap/**'
      - '.github/workflows/terraform-bootstrap.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  secrets-scan:
    uses: security-org-230982/security-engineering/.github/workflows/gitleaks.yaml@main
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  iac-scan:
    uses: security-org-230982/security-engineering/.github/workflows/iac-static-scans.yaml@main

  terraform-bootstrap:
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - iac-scan
    defaults:
      run:
        working-directory: terraform/bootstrap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve